name: 自动部署 NestJS + 前端项目

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 云端构建后端（包含 SuperAdminBootstrapService）
      - name: 安装后端依赖并打包
        run: |
          npm install
          npx prisma generate
          npm run build

      # 云端构建前端
      - name: 安装并打包前端
        run: |
          cd frontend
          npm install
          npm run build
          cd dist
          tar -czf ../../frontend-dist.tar.gz *
          cd ../..

      # 同时上传 后端dist + 前端压缩包 到服务器
      - name: 上传文件到服务器
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_PRIVATE_KEY }}
          source: 'dist/,frontend-dist.tar.gz'
          target: '/tmp/'

      - name: 部署前后端
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_PRIVATE_KEY }}
          script: |
            # 1. 部署前端
            sudo rm -rf /www/wwwroot/frontend/dist/*
            sudo tar -xzf /tmp/frontend-dist.tar.gz -C /www/wwwroot/frontend/dist/
            sudo chown -R www:www /www/wwwroot/frontend/

            # 2. 同步云端构建的后端dist到容器（关键！）
            docker cp /tmp/dist/. nestjs-app:/app/dist/

            # 3. 重启容器，加载新代码
            docker restart nestjs-app

            # 4. 清理临时文件
            sudo rm -rf /tmp/dist /tmp/frontend-dist.tar.gz

            nginx -s reload
            echo "✅ 部署完成"
