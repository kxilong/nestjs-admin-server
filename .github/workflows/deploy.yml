name: 自动部署 NestJS + 前端项目

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      APP_DIR: /home/ubuntu/nestjs-admin-server
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      REDIS_HOST: ${{ secrets.REDIS_HOST }}
      REDIS_PORT: ${{ secrets.REDIS_PORT }}
      JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
      JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
      JWT_ACCESS_EXPIRES_IN: ${{ secrets.JWT_ACCESS_EXPIRES_IN }}
      JWT_REFRESH_EXPIRES_IN: ${{ secrets.JWT_REFRESH_EXPIRES_IN }}
      DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
      AI_MODEL: qwen3.5-122b-a10b
      DASHSCOPE_BASE_URL: https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
      THROTTLE_LIMIT: ${{ secrets.THROTTLE_LIMIT }}
      NODE_ENV: production
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 云端构建后端（包含 SuperAdminBootstrapService）
      - name: 安装后端依赖并打包
        run: |
          npm install --include=dev
          npx prisma generate
          npm run build
          tar -czf backend-dist.tar.gz dist

      # 云端构建前端
      - name: 安装并打包前端
        run: |
          cd frontend
          npm install --include=dev
          export VITE_API_BASE="/api"
          export VITE_APP_VERSION="${GITHUB_SHA::8}"
          npm run build
          cd dist
          tar -czf ../../frontend-dist.tar.gz *
          cd ../..
          tar -czf deploy-bundle.tar.gz backend-dist.tar.gz frontend-dist.tar.gz docker-compose.yml

      # 用原生 scp 上传（带重试），绕过 drone-scp 在部分机器上的 EOF 问题
      - name: 上传发布包到服务器（原生 scp + 重试）
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_PRIVATE_KEY }}
        run: |
          set -e
          mkdir -p ~/.ssh
          printf '%s\n' "$SERVER_SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          ok=0
          for i in 1 2 3 4 5; do
            echo "scp attempt: $i"
            if scp -i ~/.ssh/id_rsa -o ConnectTimeout=20 -o ServerAliveInterval=15 -o ServerAliveCountMax=3 -o StrictHostKeyChecking=yes \
              deploy-bundle.tar.gz "${SERVER_USER}@${SERVER_HOST}:/tmp/deploy-bundle.tar.gz"; then
              ok=1
              break
            fi
            sleep $((i * 6))
          done

          if [ "$ok" -ne 1 ]; then
            echo "ERROR: scp upload failed after retries"
            exit 1
          fi

      - name: 部署前后端（原生 ssh + 重试）
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_PRIVATE_KEY }}
        run: |
          set -e
          mkdir -p ~/.ssh
          printf '%s\n' "$SERVER_SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          REMOTE_SCRIPT_FILE="/tmp/deploy-remote.sh"
          cat > "$REMOTE_SCRIPT_FILE" <<'EOS'
          set -e

          APP_DIR="/home/ubuntu/nestjs-admin-server"
          FRONT_DIST_DIR="$APP_DIR/frontend/dist"
          ALT_FRONT_DIST_DIR="/www/wwwroot/frontend/dist"
          BACK_DIST_DIR="$APP_DIR/dist"
          DEPLOY_ENV_FILE="/tmp/nestjs-admin-deploy.env"
          sudo rm -rf /tmp/deploy-bundle
          sudo mkdir -p /tmp/deploy-bundle
          sudo tar -xzf /tmp/deploy-bundle.tar.gz -C /tmp/deploy-bundle
          sudo sh -c "cat > \"$DEPLOY_ENV_FILE\" <<'EOF'
          DATABASE_URL=${DATABASE_URL}
          REDIS_HOST=${REDIS_HOST}
          REDIS_PORT=${REDIS_PORT}
          JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
          JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
          JWT_ACCESS_EXPIRES_IN=${JWT_ACCESS_EXPIRES_IN}
          JWT_REFRESH_EXPIRES_IN=${JWT_REFRESH_EXPIRES_IN}
          DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
          AI_MODEL=${AI_MODEL}
          DASHSCOPE_BASE_URL=${DASHSCOPE_BASE_URL}
          THROTTLE_LIMIT=${THROTTLE_LIMIT}
          NODE_ENV=${NODE_ENV}
          EOF"

          sudo cp /tmp/deploy-bundle/docker-compose.yml "$APP_DIR/docker-compose.yml"
          sudo mkdir -p "$FRONT_DIST_DIR" "$BACK_DIST_DIR"
          sudo rm -rf "$FRONT_DIST_DIR"/*
          sudo tar -xzf /tmp/deploy-bundle/frontend-dist.tar.gz -C "$FRONT_DIST_DIR"
          if [ -d "$ALT_FRONT_DIST_DIR" ]; then
            sudo rm -rf "$ALT_FRONT_DIST_DIR"/*
            sudo tar -xzf /tmp/deploy-bundle/frontend-dist.tar.gz -C "$ALT_FRONT_DIST_DIR"
          fi

          sudo rm -rf /tmp/backend-dist
          sudo mkdir -p /tmp/backend-dist
          sudo tar -xzf /tmp/deploy-bundle/backend-dist.tar.gz -C /tmp/backend-dist
          sudo rm -rf "$BACK_DIST_DIR"/*
          sudo cp -r /tmp/backend-dist/dist/. "$BACK_DIST_DIR/"

          if sudo docker compose --env-file "$DEPLOY_ENV_FILE" -f "$APP_DIR/docker-compose.yml" config --services | grep -qx 'redis'; then
            sudo docker compose --env-file "$DEPLOY_ENV_FILE" -f "$APP_DIR/docker-compose.yml" up -d redis db
          else
            sudo docker compose --env-file "$DEPLOY_ENV_FILE" -f "$APP_DIR/docker-compose.yml" up -d db
          fi
          sudo docker compose --env-file "$DEPLOY_ENV_FILE" -f "$APP_DIR/docker-compose.yml" up -d --build app

          CONTAINER_ID="$(sudo docker compose --env-file "$DEPLOY_ENV_FILE" -f "$APP_DIR/docker-compose.yml" ps -q app | head -n 1)"
          if [ -z "$CONTAINER_ID" ]; then
            CONTAINER_ID="$(sudo docker ps -q --filter name=nestjs-app | head -n 1)"
          fi
          if [ -z "$CONTAINER_ID" ]; then
            echo "错误：未找到 app 容器"
            exit 1
          fi

          sudo docker cp /tmp/backend-dist/dist/. "$CONTAINER_ID:/app/dist/"
          sudo docker restart "$CONTAINER_ID" > /dev/null
          sudo chown -R www:www "$APP_DIR/frontend" || true
          sudo rm -f "$DEPLOY_ENV_FILE"
          sudo rm -rf /tmp/backend-dist /tmp/deploy-bundle /tmp/deploy-bundle.tar.gz
          sudo nginx -s reload
          echo "✅ 部署完成"
          EOS

          ok=0
          for i in 1 2 3 4 5; do
            echo "ssh deploy attempt: $i"
            if ssh -i ~/.ssh/id_rsa -o ConnectTimeout=20 -o ServerAliveInterval=15 -o ServerAliveCountMax=3 -o StrictHostKeyChecking=yes \
              "${SERVER_USER}@${SERVER_HOST}" \
              "export DATABASE_URL='${DATABASE_URL}' REDIS_HOST='${REDIS_HOST}' REDIS_PORT='${REDIS_PORT}' JWT_ACCESS_SECRET='${JWT_ACCESS_SECRET}' JWT_REFRESH_SECRET='${JWT_REFRESH_SECRET}' JWT_ACCESS_EXPIRES_IN='${JWT_ACCESS_EXPIRES_IN}' JWT_REFRESH_EXPIRES_IN='${JWT_REFRESH_EXPIRES_IN}' DASHSCOPE_API_KEY='${DASHSCOPE_API_KEY}' AI_MODEL='${AI_MODEL}' DASHSCOPE_BASE_URL='${DASHSCOPE_BASE_URL}' THROTTLE_LIMIT='${THROTTLE_LIMIT}' NODE_ENV='${NODE_ENV}'; bash -s" < "$REMOTE_SCRIPT_FILE"; then
              ok=1
              break
            fi
            sleep $((i * 8))
          done
          rm -f "$REMOTE_SCRIPT_FILE"

          if [ "$ok" -ne 1 ]; then
            echo "ERROR: ssh deploy failed after retries"
            exit 1
          fi
