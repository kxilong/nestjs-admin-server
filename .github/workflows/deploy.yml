name: 自动部署 NestJS + 前端项目

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 2. 配置 Node.js
      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 3. 后端构建
      - name: 安装后端依赖并打包
        run: |
          npm install
          npx prisma generate
          npm run build

      # 4. 前端构建
      - name: 安装并打包前端
        run: |
          cd frontend
          npm install
          npm run build
          # 进入dist目录，打包里面的文件（不带dist目录结构）
          cd dist
          tar -czf ../../frontend-dist.tar.gz *
          cd ../..

      # 5. 确认打包文件存在
      - name: 检查前端打包文件
        run: ls -la frontend-dist.tar.gz

      # 6. 上传打包文件到服务器
      - name: 上传前端打包文件
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_PRIVATE_KEY }}
          source: 'frontend-dist.tar.gz'
          target: '/tmp/'

      # 7. 服务器端解压 + 部署 + 重启服务
      - name: 部署后端并更新前端
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_PRIVATE_KEY }}
          script: |
            # ===================== 前端部署（不变） =====================
            # 清空旧的前端文件
            sudo rm -rf /www/wwwroot/frontend/dist/*

            # 解压新文件到目标目录
            sudo tar -xzf /tmp/frontend-dist.tar.gz -C /www/wwwroot/frontend/dist/

            # 设置Nginx权限
            sudo chown -R www:www /www/wwwroot/frontend/
            sudo chmod -R 755 /www/wwwroot/frontend/

            # 删除临时文件
            sudo rm -f /tmp/frontend-dist.tar.gz

            # ===================== 后端修复（核心更新） =====================
            cd /home/ubuntu/nestjs-admin-server

            # 强制拉取最新代码（解决服务器代码不更新）
            git fetch --all
            git reset --hard origin/master
            git pull origin master

            # 把最新代码 复制 进 Docker 容器（真正让后端生效）
            docker cp . nestjs-app:/app/

            # 重启容器，加载新代码
            docker restart nestjs-app

            # 重载Nginx
            nginx -s reload

            echo "✅ 部署完成！前后端均已更新"
